// mod inverse

/**
 * Computes the modular multiplicative inverse of a modulo m.
 * Returns NaN if the inverse does not exist.
 */
function modInverse(a, m) {
    let m0 = BigInt(m);
    let y = 0n, x = 1n;

    if (m0 === 1n) return 0n;

    while (a > 1n) {
        // q is quotient
        let q = a / m0;
        let t = m0;

        // m0 is remainder now, process same as
        // Euclid's algo
        m0 = a % m0;
        a = t;
        t = y;

        // Update y and x
        y = x - q * y;
        x = t;
    }

    // Make x positive
    if (x < 0n) x += BigInt(m);

    return x;
}
