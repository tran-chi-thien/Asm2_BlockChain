<!DOCTYPE html>
<html>
<body>
<h1>Task 1</h1>
<textarea id="record"></textarea>
<select id="inventory">
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
</select>

<button onclick="sign()">Sign</button>
<button onclick="verify()">Verify</button>
<p id="results"></p>
<script src="crypto-js.min.js"></script>
<script type="module">
import keys from '/Config/keys.js';

// Computes the modular multiplicative inverse of a modulo m.
// Returns NaN if the inverse does not exist.

function modInverse(a, m) {
    let m0 = BigInt(m);
    let y = 0n, x = 1n;

    if (m0 === 1n){
        return 0n;
    } 

    while (a > 1n) {
        // q is quotient
        let q = a / m0;
        let t = m0;

        // m0 is remainder now, process same as
        // Euclid's algorithm
        m0 = a % m0;
        a = t;
        t = y;

        // Update y and x
        y = x - q * y;
        x = t;
    }

    // Make x positive
    if (x < 0n){
        x += BigInt(m);
    }

    return x;
}
// https://www.geeksforgeeks.org/dsa/multiplicative-inverse-under-modulo-m/
// power mod
function powMod(base, exp, mod) {
    let result = 1n;
    base %= mod;

    while (exp > 0n) {
        if (exp % 2n) result = (result * base) % mod;
        base = (base * base) % mod;
        exp /= 2n;
    }

    return result;
}
// sha 256 hash
function sha256(data){
    let hashOutput = CryptoJS.SHA256(data).toString();
    return hashOutput
}
// derive n, phi and d
function calculateRSAParams(){
    // Calculates value of n, phi and d
    let p = 0;
    let q = 0;
    let e = 0;
    if (document.getElementById("inventory").value === 'A'){
        p = keys.PART1.A.p
        q = keys.PART1.A.q
        e = keys.PART1.A.e
    }
    else if (document.getElementById("inventory").value === 'B'){
        p = keys.PART1.B.p
        q = keys.PART1.B.q
        e = keys.PART1.B.e
    }
    else if (document.getElementById("inventory").value === 'C'){
        p = keys.PART1.C.p
        q = keys.PART1.C.q
        e = keys.PART1.C.e
    }
    else{
        p = keys.PART1.D.p
        q = keys.PART1.D.q
        e = keys.PART1.D.e
    }
    let n = p * q
    let phi = (p-1n) * (q-1n)
    let d = modInverse(e, phi)
    return { p, q, e, n, phi, d };
}
// sign record hash^d mod n
let signature = null
let results = document.getElementById("results");
function sign(){
    let { p, q, e, n, phi, d} = calculateRSAParams()

    results.textContent = "";
    results.innerHTML += (`p value: ${p}<br>q value: ${q}<br>e value: ${e}<br>`)

    let plaintext = document.getElementById("record").value;
    let hash = sha256(plaintext);
    let decimalHash = BigInt("0x" + hash);

    signature = powMod(decimalHash, d, n);

    results.innerHTML += (`n value: ${n}<br>phi value: ${phi}<br>d value: ${d}<br>`)
    results.innerHTML += (`public key: (${e}, ${n})<br>private key: (${d}, ${n})<br>`)
    results.innerHTML += (`hash value: ${hash}<br>decimal hash value: ${decimalHash}<br>`)
    results.innerHTML += (`signature value: ${signature}`)
}
// verify signature sig^e mod n
function verify(){
    if (!signature){
        results.innerHTML = "No signature to verify";
        return;
    }
    let record = document.getElementById("record").value;
    let inventory = document.getElementById("inventory").value;
    let { p, q, e, n } = calculateRSAParams();
    let hashedRecord = sha256(record);
    let decimalHash = BigInt("0x" + hashedRecord);
    let decryptedSig = powMod(signature, e, n)
    if (decimalHash === decryptedSig){
        results.innerHTML = "Sig good"
    }
    console.log(decimalHash, decryptedSig)
}
window.sign = sign;
window.verify = verify;
</script>
</body>
</html>
